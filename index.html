<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Brunella ❤️</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
overflow:hidden;
}

#inicio{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

#galeria{
display:none;
}

img{
max-width:80%;
max-height:70vh;
border-radius:15px;
margin-top:40px;
}

#mensaje{
display:none;
font-size:32px;
width:80%;
margin:auto;
margin-top:20vh;
line-height:1.6;
}

.corazon{
position:fixed;
top:-10px;
color:red;
font-size:24px;
animation:caer 5s linear infinite;
}

@keyframes caer{
0%{transform:translateY(-10px);}
100%{transform:translateY(110vh);}
}

#playMusic{
position:fixed;
bottom:20px;
right:20px;
font-size:18px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="inicio">
<h1>¿Lista para la aventura?</h1>
<button onclick="iniciar()">Comenzar</button>
</div>

<div id="galeria">
<img id="foto" src="">
</div>

<div id="mensaje">
<p>
Pajarita…<br><br>

no quiero prometerte perfección,<br>
pero sí un corazón que está aprendiendo a amar mejor.<br><br>

Que cada momento sea un pequeño paso firme y seguro,<br>
lleno de cariño, amor y comprensión.<br><br>

Te quiero… aunque a veces no te bañes jeje ❤️
</p>
</div>

<audio id="musica" loop>
<source src="Camila.mp3" type="audio/mpeg">
</audio>

<button id="playMusic" onclick="playMusic()">🎵 Activar música</button>

<script>

let fotos=[
"foto1.jpg",
"foto2.jpg",
"foto3.jpg",
"foto4.jpg",
"foto5.jpg"
];

let i=0;

function iniciar(){

document.getElementById("inicio").style.display="none";
document.getElementById("galeria").style.display="block";

mostrarFoto();
corazones();

}

function mostrarFoto(){

if(i<fotos.length){

document.getElementById("foto").src=fotos[i];
i++;

setTimeout(mostrarFoto,3000);

}else{

document.getElementById("galeria").style.display="none";
document.getElementById("mensaje").style.display="block";

}

}

function corazones(){

setInterval(()=>{

let c=document.createElement("div");
c.className="corazon";
c.innerHTML="❤️";

c.style.left=Math.random()*100+"vw";

document.body.appendChild(c);

setTimeout(()=>{c.remove()},5000);

},300);

}

function playMusic(){

let audio=document.getElementById("musica");
audio.play();

document.getElementById("playMusic").style.display="none";

}

</script>

</body>
</html>
